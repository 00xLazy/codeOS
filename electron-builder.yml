appId: com.codeos.app
productName: codeOS
copyright: "Copyright © 2026 00xLazy"

directories:
  output: release
  buildResources: build

files:
  - "dist-electron/**"
  - "package.json"

extraResources:
  - from: ".next/standalone"
    to: "standalone"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "standalone/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "standalone/public"
    filter:
      - "**/*"

asar: true

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
    - target: rpm
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: 00xLazy
  repo: codeOS
